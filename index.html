<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist P2P Chess</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/chess.js@0.10.3/chess.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #game-container { width: 400px; max-width: 90vw; }
        .controls { background: #2a2a2a; padding: 20px; border-radius: 12px; margin-bottom: 20px; width: 100%; box-sizing: border-box; text-align: center; }
        input { background: #333; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; margin: 5px; width: 80%; }
        button { background: #4a90e2; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.2s; }
        button:hover { background: #357abd; }
        button.secondary { background: #444; }
        #status { margin-top: 10px; font-size: 0.9em; color: #aaa; }
        .peer-id-display { font-weight: bold; color: #4a90e2; cursor: pointer; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="controls">
        <h2 style="margin-top:0">Chess P2P</h2>
        
        <div id="setup-section">
            <p>Your ID: <span id="my-id" class="peer-id-display">Connecting...</span></p>
            <input type="text" id="join-id" placeholder="Paste Opponent ID here">
            <button onclick="connectToPeer()">Join Friend</button>
            <hr style="border:0; border-top:1px solid #444; margin:15px 0;">
            <button class="secondary" onclick="startBotGame()">Play vs Bot</button>
        </div>

        <div id="game-info" style="display:none">
            <p id="turn-indicator">Waiting for move...</p>
            <button class="secondary" onclick="location.reload()">New Game / Disconnect</button>
        </div>
        
        <div id="status">Ready to play.</div>
    </div>

    <div id="myBoard"></div>
</div>

<script>
    let board = null;
    let game = new Chess();
    let peer = new Peer(); // Generates a random ID automatically
    let conn = null;
    let myColor = 'w';
    let isBotMode = false;

    // --- PeerJS Setup ---
    peer.on('open', (id) => {
        document.getElementById('my-id').innerText = id;
    });

    // Handle incoming connections
    peer.on('connection', (c) => {
        conn = c;
        myColor = 'w'; // Host is white
        setupGame();
        initConnection();
    });

    function connectToPeer() {
        const targetId = document.getElementById('join-id').value;
        if (!targetId) return alert("Enter an ID");
        conn = peer.connect(targetId);
        myColor = 'b'; // Joiner is black
        setupGame();
        initConnection();
    }

    function initConnection() {
        conn.on('open', () => {
            document.getElementById('setup-section').style.display = 'none';
            document.getElementById('game-info').style.display = 'block';
            updateStatus("Connected! Game started.");
            if(myColor === 'b') board.orientation('black');
        });

        conn.on('data', (data) => {
            game.move(data);
            board.position(game.fen());
            updateStatus();
        });
    }

    // --- Game Logic ---
    function onDragStart(source, piece, position, orientation) {
        if (game.game_over()) return false;
        
        // Only pick up pieces for the player's color
        if (!isBotMode) {
            if ((myColor === 'w' && piece.search(/^b/) !== -1) ||
                (myColor === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }
        
        // Don't allow move if it's not your turn
        if ((game.turn() === 'w' && myColor === 'b') || 
            (game.turn() === 'b' && myColor === 'w')) return false;
    }

    function onDrop(source, target) {
        let move = game.move({
            from: source,
            to: target,
            promotion: 'q'
        });

        if (move === null) return 'snapback';

        updateStatus();

        // Send move to peer
        if (conn && conn.open) {
            conn.send(move);
        }

        // If bot mode, trigger bot response
        if (isBotMode && !game.game_over()) {
            window.setTimeout(makeRandomMove, 250);
        }
    }

    function updateStatus() {
        let status = '';
        let moveColor = (game.turn() === 'w') ? 'White' : 'Black';

        if (game.in_checkmate()) {
            status = 'Game over, ' + moveColor + ' is in checkmate.';
        } else if (game.in_draw()) {
            status = 'Game over, drawn position';
        } else {
            status = moveColor + ' to move';
            if (game.in_check()) status += ', ' + moveColor + ' is in check';
        }

        document.getElementById('status').innerText = status;
    }

    function setupGame() {
        const config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        board = ChessBoard('myBoard', config);
        updateStatus();
    }

    // --- Bot Logic ---
    function startBotGame() {
        isBotMode = true;
        myColor = 'w';
        document.getElementById('setup-section').style.display = 'none';
        document.getElementById('game-info').style.display = 'block';
        setupGame();
    }

    function makeRandomMove() {
        let possibleMoves = game.moves();
        if (possibleMoves.length === 0) return;

        let randomIdx = Math.floor(Math.random() * possibleMoves.length);
        game.move(possibleMoves[randomIdx]);
        board.position(game.fen());
        updateStatus();
    }

    // Start UI
    setupGame();
</script>
</body>
</html>
